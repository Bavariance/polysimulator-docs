<svg width="160" height="40" viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Isometric cube icon (pointy-top hexagon) -->
  <!-- Back face (lowest opacity) -->
  <path d="M4,13 L16,5 L28,13 L28,27 L16,35 L4,27 Z" fill="#10B981" opacity="0.25"/>
  <!-- Left face -->
  <path d="M4,13 L16,5 L16,24 L4,27 Z" fill="#10B981" opacity="0.65"/>
  <!-- Right face (full) -->
  <path d="M16,5 L28,13 L28,27 L16,24 Z" fill="#10B981"/>
  <!-- Centre ridge -->
  <line x1="16" y1="5" x2="16" y2="24" stroke="rgba(0,0,0,0.12)" stroke-width="0.8"/>
  <!-- Wordmark -->
  <text
    x="36" y="26"
    fill="#0F172A"
    font-size="17"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
    font-weight="500"
    letter-spacing="-0.02em">PolySimulator</text>
</svg>
